name: Tech Debt / Maintenance
description: Report technical debt, refactoring needs, or maintenance tasks
title: "[Tech Debt] "
labels: ["tech-debt"]
body:
  - type: markdown
    attributes:
      value: |
        # Technical Debt / Maintenance

        Use this for code cleanup, test coverage gaps, dependency updates,
        or kernel optimization needs.

  - type: dropdown
    id: debt-type
    attributes:
      label: Type of Debt
      options:
        - Test Coverage - Missing or inadequate tests
        - Code Quality - Duplication, complexity, or poor abstractions
        - Dependencies - Outdated or problematic dependencies
        - Performance - Known bottlenecks or inefficiencies
        - Kernel Optimization - Triton/CUDA kernel improvements
        - Documentation - Missing or outdated docs
        - Infrastructure - Build, CI/CD, or tooling issues
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What is the current state? Why is it problematic?
    validations:
      required: true

  - type: textarea
    id: location
    attributes:
      label: Location
      description: File paths, line numbers, or module names.
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: What is the current or potential impact?
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Critical - Actively causing bugs or security risk
        - High - Significant risk or developer friction
        - Medium - Should be addressed soon
        - Low - Address when convenient
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: Location is clearly identified
          required: true
        - label: Impact is documented
          required: true
