name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        # Bug Report

        Thanks for reporting a bug! Please fill out this template to help us
        understand and reproduce the issue.

        **Before submitting:**
        - Search existing issues to avoid duplicates
        - Try to reproduce with the latest version

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: |
        When using CompressedDynamicCache with bits=4 on a model with head_dim=64,
        dequantized values have NaN entries after 500+ tokens.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the bug.
      placeholder: |
        1. Create a CompressedDynamicCache with head_dim=64, bits=4
        2. Run model.generate() with max_new_tokens=512
        3. Observe NaN in decompressed key cache at layer 18+
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include error messages or stack traces.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      value: |
        - OS:
        - Python:
        - turboquant-vllm version:
        - torch version:
        - GPU:
        - Installation method: uv / pip
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Critical - Data loss, security issue, or crash
        - High - Major feature broken, no workaround
        - Medium - Feature impaired, workaround exists
        - Low - Minor issue, cosmetic, or edge case
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Bug Report Checklist
      options:
        - label: I have searched existing issues to avoid duplicates
          required: true
        - label: I have provided steps to reproduce the bug
          required: true
