name: Publish to PyPI

# Triggered when release-please (or manual) creates a version tag.
# Requires RELEASE_PLEASE_TOKEN (PAT with repo scope) in release-please.yml —
# tags created by GITHUB_TOKEN do NOT trigger other workflows.
on:
  push:
    tags:
      - "v*"

# Least-privilege: read-only by default; publish jobs escalate per-job.
permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref_name }}
  cancel-in-progress: false # never cancel an in-flight publish

jobs:
  # ---------------------------------------------------------------------------
  # Build — produce sdist + wheel, smoke test install, upload as artifact.
  # Note: quality-gate skipped for now — tests require CUDA hardware.
  # ---------------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv python install 3.12

      - name: Build distributions
        run: uv build

      - name: Verify version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          TOML_VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          if [ "$TAG_VERSION" != "$TOML_VERSION" ]; then
            echo "::error::Tag version ${TAG_VERSION} does not match pyproject.toml version ${TOML_VERSION}"
            exit 1
          fi
          echo "Version ${TAG_VERSION} matches — OK"

      - name: Smoke-test wheel
        run: |
          # --- size gate (torch is not bundled, wheel should be small) ---
          WHEEL=$(ls dist/*.whl)
          SIZE=$(stat --format=%s "$WHEEL")
          MAX=$((500 * 1024))
          if [ "$SIZE" -gt "$MAX" ]; then
            echo "::error::Wheel is ${SIZE} bytes (max ${MAX})"
            exit 1
          fi
          echo "Wheel size ${SIZE} bytes — OK"

          # --- no test or dev files leaked into wheel ---
          CONTENTS=$(python3 -m zipfile -l "$WHEEL")
          for PATTERN in tests/ _bmad/ .pre-commit; do
            if echo "$CONTENTS" | grep -q "$PATTERN"; then
              echo "::error::Wheel contains '${PATTERN}' files"
              exit 1
            fi
          done
          echo "Wheel content exclusions — OK"

          # --- install and verify metadata ---
          uv venv /tmp/smoke --python 3.12
          SMOKE=/tmp/smoke/bin
          uv pip install --python "$SMOKE/python" dist/*.whl --no-deps
          "$SMOKE/python" -c "
          import importlib.metadata
          m = importlib.metadata.metadata('turboquant-vllm')
          assert m['Name'] == 'turboquant-vllm', f'Wrong name: {m[\"Name\"]}'
          assert m['Version'] == '${GITHUB_REF_NAME#v}', f'Wrong version: {m[\"Version\"]}'
          print(f'{m[\"Name\"]} {m[\"Version\"]} — metadata OK')
          "

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Publish to PyPI — production release.
  # Uses OIDC trusted publishing (no stored tokens).
  # ---------------------------------------------------------------------------
  publish-pypi:
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false
          ignore-empty-workdir: true
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        run: uv publish --trusted-publishing always --check-url https://pypi.org/simple/
